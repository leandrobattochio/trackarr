pluginId: bj-share
displayName: BJ-Share

fields:
  - name: cookie
    label: Cookie
    type: text
    required: true
    sensitive: true
  - name: username
    label: User Name
    type: text
    required: true

http:
  headers:
    Accept: application/json
    Cookie: "{{cookie}}"

authFailure:
  htmlPatterns:
    - "Login"
    - "login.php"
    - "name=\"password\""
    - "type=\"password\""

steps:
  - name: profile
    method: POST
    url: "user.php?username={{username}}"
    responseType: html
    extract:
      uploadedBytes:
        regex: "<li\\s+class=\"tooltip\"\\s+title=\"(?<value>[^\"]+)\">\\s*Enviado:"
        transform: byteSize
      downloadedBytes:
        regex: "<li\\s+class=\"tooltip\"\\s+title=\"(?<value>[^\"]+)\">\\s*Baixado:"
        transform: byteSize
      ratio:
        regex: "Ratio:\\s*<span[^>]*title=\"(?<value>[^\"]+)\""
        transform: decimal
      seedBonus:
        regex: "<li\\s+id=\"stats_bjpontos\"[^>]*>.*?<span[^>]*>(?<value>[\\d\\.,]+)</span>"
        transform: integer

  - name: seeding
    method: GET
    url: "torrents.php?type=seeding&username={{username}}"
    responseType: html
    extract:
      seedingTorrents:
        regex: "<tr[^>]*class=\"[^\"]*torrent[^\"]*torrent_row[^\"]*\"[^>]*>"
        countMatches: true

  - name: leeching
    method: GET
    url: "torrents.php?type=leeching&username={{username}}"
    responseType: html
    extract:
      leechingTorrents:
        regex: "<tr[^>]*class=\"[^\"]*torrent[^\"]*torrent_row[^\"]*\"[^>]*>"
        countMatches: true

mapping:
  ratio: "steps.profile.ratio"
  uploadedBytes: "steps.profile.uploadedBytes"
  downloadedBytes: "steps.profile.downloadedBytes"
  seedBonus: "steps.profile.seedBonus"
  requiredRatio: "fields.required_ratio"
  seedingTorrents: "steps.seeding.seedingTorrents"
  leechingTorrents: "steps.leeching.leechingTorrents"
  activeTorrents: "steps.seeding.seedingTorrents + steps.leeching.leechingTorrents"

dashboard:
  metrics:
    - stat: uploadedBytes
      label: Uploaded
      format: bytes
      icon: arrow-up
      tone: success
    - stat: downloadedBytes
      label: Downloaded
      format: bytes
      icon: arrow-down
      tone: primary
    - stat: seedBonus
      label: Seed Bonus
      format: text
      icon: coins
      tone: warning
