name: CI

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:

permissions:
  contents: write
  packages: write

jobs:
  frontend:
    uses: ./.github/workflows/frontend-checks.yml
    secrets: inherit

  backend:
    uses: ./.github/workflows/backend-checks.yml
    secrets: inherit

  full-stack-e2e:
    uses: ./.github/workflows/full-stack-e2e.yml
    secrets: inherit

  docker-publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs:
      - frontend
      - backend
      - full-stack-e2e
    uses: ./.github/workflows/docker-publish.yml
    secrets: inherit

  github-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs:
      - docker-publish
    uses: ./.github/workflows/github-release.yml
    secrets: inherit
