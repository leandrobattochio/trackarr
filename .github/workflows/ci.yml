name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - run: corepack enable
      - run: yarn install --frozen-lockfile
      - run: yarn build

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - run: corepack enable
      - run: yarn install --frozen-lockfile
      - run: yarn lint

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - run: corepack enable
      - run: yarn install --frozen-lockfile
      - run: yarn test

  frontend-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - run: corepack enable
      - run: yarn install --frozen-lockfile
      - run: yarn audit --level moderate

  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - run: dotnet restore backend/src/TrackerStats.Api/TrackerStats.Api.csproj
      - run: dotnet build backend/src/TrackerStats.Api/TrackerStats.Api.csproj --configuration Release --no-restore

  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - run: dotnet restore backend/src/TrackerStats.Api/TrackerStats.Api.csproj
      - run: dotnet test backend/src/TrackerStats.Api/TrackerStats.Api.csproj --configuration Release --no-restore
