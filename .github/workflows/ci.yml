name: CI

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:

permissions:
  contents: write
  packages: write

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - run: corepack enable
      - run: yarn install --frozen-lockfile
      - run: yarn build

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - run: corepack enable
      - run: yarn install --frozen-lockfile
      - run: yarn lint

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - run: corepack enable
      - run: yarn install --frozen-lockfile
      - run: yarn test

  frontend-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - run: corepack enable
      - run: yarn install --frozen-lockfile
      - name: Audit moderate and above
        shell: bash
        run: |
          audit_output=$(yarn audit --json || true)
          echo "$audit_output"

          summary=$(echo "$audit_output" | grep '"type":"auditSummary"' | tail -n 1)
          if [ -z "$summary" ]; then
            echo "Missing yarn audit summary"
            exit 1
          fi

          moderate=$(echo "$summary" | sed -E 's/.*"moderate":([0-9]+).*/\1/')
          high=$(echo "$summary" | sed -E 's/.*"high":([0-9]+).*/\1/')
          critical=$(echo "$summary" | sed -E 's/.*"critical":([0-9]+).*/\1/')

          if [ "$moderate" -gt 0 ] || [ "$high" -gt 0 ] || [ "$critical" -gt 0 ]; then
            echo "Audit failed: moderate=$moderate high=$high critical=$critical"
            exit 1
          fi

  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - run: dotnet restore backend/src/TrackerStats.Api/TrackerStats.Api.csproj
      - run: dotnet build backend/src/TrackerStats.Api/TrackerStats.Api.csproj --configuration Release --no-restore

  backend-test:
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_HOME: ${{ github.workspace }}/backend/.dotnet
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - run: dotnet restore TrackerStats.sln

      - name: Install reportgenerator
        shell: bash
        run: |
          if [ ! -f ./.tools/reportgenerator ]; then
            dotnet tool install --tool-path .tools dotnet-reportgenerator-globaltool
          fi

      - name: Run backend tests with coverage
        run: >
          dotnet test TrackerStats.sln
          --configuration Release
          --no-restore
          --collect:"XPlat Code Coverage"
          --settings coverage.runsettings
          --results-directory TestResults
          --logger "trx;LogFileName=tests.trx"

      - name: Generate HTML coverage report
        run: >
          ./.tools/reportgenerator
          -reports:"TestResults/**/coverage.cobertura.xml"
          -targetdir:"CoverageReport"
          -filefilters:"-**/obj/**/*.cs;-**/Data/AppDbContext.cs"
          -reporttypes:"Html;Cobertura"

      - name: Upload coverage report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: |
            backend/CoverageReport
            backend/TestResults
          if-no-files-found: error

  docker-publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs:
      - frontend-build
      - frontend-lint
      - frontend-test
      - frontend-audit
      - backend-build
      - backend-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/trackarr
          tags: |
            type=ref,event=tag

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  github-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs:
      - docker-publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release notes
        id: notes
        shell: bash
        run: |
          current_tag="${GITHUB_REF_NAME}"
          previous_tag=$(git tag --sort=-creatordate | grep -Fxv "$current_tag" | head -n 1 || true)

          {
            echo "body<<EOF"
            echo "Container image: \`ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/trackarr:${current_tag}\`"
            echo

            if [ -n "$previous_tag" ]; then
              echo "Compare changes: https://github.com/${GITHUB_REPOSITORY}/compare/${previous_tag}...${current_tag}"
            else
              echo "Compare changes: first tagged release"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
